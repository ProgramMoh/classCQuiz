<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CA DMV Class C Practice Test</title>
  <meta name="description" content="Practice for the California Class C driver license knowledge test with quizzes, study mode, and tips for UAE drivers transitioning to California.">
  <link rel="stylesheet" href="css/styles.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%23f0b429'/><text x='50' y='62' text-anchor='middle' fill='%23000' font-size='50' font-weight='bold' font-family='Arial'>CA</text></svg>">
</head>
<body>

  <!-- Header -->
  <header class="site-header" id="site-header">
    <div class="header-inner">
      <div class="logo" onclick="App.navigate('home')" role="button" tabindex="0" id="logo-home">
        <span class="logo-icon">CA</span>
        <span>CA DMV Prep</span>
      </div>
      <button class="menu-toggle" id="menu-toggle" aria-label="Toggle menu">☰</button>
      <nav class="nav-links" id="nav-links">
        <a href="#home" class="nav-link active" data-page="home" id="nav-home">Home</a>
        <a href="#quiz" class="nav-link" data-page="quiz" id="nav-quiz">Quiz</a>
        <a href="#study" class="nav-link" data-page="study" id="nav-study">Study</a>
        <a href="#tips" class="nav-link" data-page="tips" id="nav-tips">Tips</a>
        <a href="#scores" class="nav-link" data-page="scores" id="nav-scores">Scores</a>
      </nav>
    </div>
  </header>

  <!-- Main -->
  <main class="main-content">
    <div class="container">

      <!-- HOME PAGE -->
      <section class="page active" id="page-home">
        <div class="home-header">
          <h1 class="page-title">California Class C — Practice Test</h1>
          <p class="page-subtitle">150+ questions based on the CA Driver Handbook. 46 questions on the real test, 38 correct (83%) to pass.</p>
        </div>
        <div class="home-actions">
          <button class="btn btn-primary" onclick="App.navigate('quiz')" id="btn-start-quiz">Start Quiz</button>
          <button class="btn btn-secondary" onclick="App.navigate('study')" id="btn-start-study">Study Questions</button>
        </div>
        <div class="stat-grid" id="home-stats">
          <div class="stat-card">
            <div class="stat-value" id="stat-questions">0</div>
            <div class="stat-label">Questions</div>
          </div>
          <div class="stat-card">
            <div class="stat-value" id="stat-categories">0</div>
            <div class="stat-label">Categories</div>
          </div>
          <div class="stat-card">
            <div class="stat-value" id="stat-best">—</div>
            <div class="stat-label">Best Score</div>
          </div>
        </div>
      </section>

      <!-- QUIZ PAGE -->
      <section class="page" id="page-quiz">
        <!-- Quiz setup, active quiz, and results are rendered dynamically -->
      </section>

      <!-- STUDY PAGE -->
      <section class="page" id="page-study">
        <!-- Study mode rendered dynamically -->
      </section>

      <!-- TIPS PAGE -->
      <section class="page" id="page-tips">
        <!-- Tips rendered dynamically -->
      </section>

      <!-- SCORES PAGE -->
      <section class="page" id="page-scores">
        <!-- Score history rendered dynamically -->
      </section>

    </div>
  </main>

  <!-- Scripts -->
  <script src="js/questions.js"></script>
  <script src="js/app.js"></script>
  <script src="js/quiz.js"></script>
  <script src="js/study.js"></script>
  <script src="js/tips.js"></script>
  <script src="js/scores.js"></script>

</body>
</html>
